<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Контакти – Варо-бетонов център „Кольо Фичето"</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; color: #222; background: #fff; }

    /* NAV */
    nav {
      background: #fff;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 80px;
      border-bottom: 3px solid #335e96;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav .logo img { height: 55px; display: block; }
    nav ul { list-style: none; display: flex; gap: 36px; }
    nav ul li a {
      color: #335e96;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav ul li a:hover { color: #c0392b; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .hamburger span { display: block; width: 25px; height: 3px; background: #335e96; border-radius: 2px; }
    .mobile-menu { display: none; flex-direction: column; background: #fff; border-bottom: 3px solid #335e96; padding: 16px 24px; gap: 16px; }
    .mobile-menu a { color: #335e96; text-decoration: none; font-size: 1rem; font-weight: 600; }
    .mobile-menu.open { display: flex; }

    /* PAGE HERO */
    .page-hero {
      background: #335e96;
      color: #fff;
      padding: 80px 60px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .page-hero .label {
      font-size: 0.7rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }
    .page-hero h1 {
      font-size: 3rem;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    /* MAIN LAYOUT */
    .contact-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 500px;
    }

    /* LEFT - DETAILS */
    .contact-details {
      padding: 70px 60px;
      border-right: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }
    .contact-item {}
    .contact-item .item-label {
      font-size: 0.68rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #335e96;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .contact-item .item-value {
      font-size: 1.15rem;
      font-weight: 600;
      color: #222;
      line-height: 1.6;
    }
    .contact-item .item-value a {
      color: #222;
      text-decoration: none;
      transition: color 0.2s;
    }
    .contact-item .item-value a:hover { color: #335e96; }
    .contact-item .item-sub {
      font-size: 0.9rem;
      color: #888;
      font-weight: 300;
      margin-top: 4px;
    }

    /* RIGHT - MAP */
    .contact-map {
      position: relative;
    }
    .contact-map iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* FOOTER */
    footer {
      background: #335e96;
      color: rgba(255,255,255,0.75);
      text-align: center;
      padding: 28px;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      nav ul { display: none; }
      .hamburger { display: flex; }

      .page-hero { padding: 50px 24px; }
      .page-hero h1 { font-size: 2.2rem; }

      .contact-wrap { grid-template-columns: 1fr; }
      .contact-details { padding: 50px 24px; border-right: none; border-bottom: 1px solid #e8e8e8; }
      .contact-map { height: 350px; position: relative; }

      footer { font-size: 0.75rem; padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">
      <a href="index.html"><img src="Logo 2025 1 of 1.png" alt="Кольо Фичето"></a>
    </div>
    <ul>
      <li><a href="about.html">За нас</a></li>
      <li><a href="services.html">Услуги</a></li>
    </ul>
    <button class="hamburger">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu">
    <a href="about.html">За нас</a>
    <a href="services.html">Услуги</a>
  </div>

  <div class="page-hero">
    <div class="label">Свържете се с нас</div>
    <h1>Контакти</h1>
  </div>

  <div class="contact-wrap">
    <div class="contact-details">

      <div class="contact-item">
        <div class="item-label">Адрес</div>
        <div class="item-value">гр. Стара Загора<br>ул. Индустриална 1</div>
      </div>

      <div class="contact-item">
        <div class="item-label">Телефон</div>
        <div class="item-value"><a href="tel:+359000000000">+359 000 000 000</a></div>
      </div>

      <div class="contact-item">
        <div class="item-label">Имейл</div>
        <div class="item-value"><a href="mailto:info@example.bg">info@kolyoficheto.bg</a></div>

      </div>

      <div class="contact-item">
        <div class="item-label">Работно време</div>
        <div class="item-value">Понеделник – Петък</div>
      </div>

    </div>

    <div class="contact-map">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2944.0!2d25.6345!3d42.4257!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2sул.+Индустриална+1%2C+Стара+Загора!5e0!3m2!1sbg!2sbg!4v1"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Варо-бетонов център „Кольо Фичето". Всички права запазени.</p>
  </footer>

  <script>
    document.querySelector('.hamburger').addEventListener('click', () => {
      document.querySelector('.mobile-menu').classList.toggle('open');
    });
  </script>

</body>
</html>
